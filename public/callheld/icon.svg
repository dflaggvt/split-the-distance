<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2B2A6B"/>
      <stop offset="0.55" stop-color="#1F3A6E"/>
      <stop offset="1" stop-color="#136B6E"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C9F2EA"/>
    </linearGradient>
    <radialGradient id="node" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#5BE3C7"/>
      <stop offset="1" stop-color="#19B89B"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#06122B" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- full-bleed background (Android will mask corners) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- ambient listening arcs -->
  <g stroke="#7FE7D4" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.30">
    <path d="M353 150 a78 78 0 0 1 0 110"/>
    <path d="M381 128 a118 118 0 0 1 0 154"/>
  </g>

  <!-- the mark: a receiver whose lower curve cups upward to 'hold' the call -->
  <g filter="url(#soft)">
    <path fill="url(#mark)" d="
      M175 138
      c-30 -8 -58 14 -54 45
      c10 78 56 148 124 188
      c30 18 66 28 101 24
      c30 -4 49 -34 40 -62
      l-13 -40 c-6 -19 -27 -29 -45 -22
      l-34 13 c-9 3 -19 1 -26 -5
      c-18 -16 -33 -36 -42 -59
      c-3 -8 -2 -17 4 -24
      l23 -28 c12 -15 9 -37 -7 -47
      Z"/>
  </g>

  <!-- the held call: a captured message-node glowing at the mouthpiece -->
  <circle cx="360" cy="356" r="30" fill="url(#node)"/>
  <circle cx="360" cy="356" r="30" fill="none" stroke="#FFFFFF" stroke-width="3.5" opacity="0.5"/>
  <g fill="#06302B" opacity="0.9">
    <circle cx="349" cy="356" r="5"/>
    <circle cx="360" cy="356" r="5"/>
    <circle cx="371" cy="356" r="5"/>
  </g>
</svg>
